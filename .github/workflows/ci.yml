name: Datathon CI

on:
  push:
    branches: [main, develop, "feature/**", "refactor/**", "fix/**"]
    paths:
      - "src/**"
      - "tests/**"
      - "evaluation/**"
      - "configs/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "Dockerfile*"
      - "docker-compose*.yml"
      - ".github/workflows/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "tests/**"
      - "evaluation/**"
      - "configs/**"
      - "requirements.txt"
      - "pyproject.toml"
      - "Dockerfile*"
      - "docker-compose*.yml"

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy bandit pytest-cov pip-audit

      - name: Lint (ruff)
        run: ruff check src/ tests/ evaluation/

      - name: Format check (ruff)
        run: ruff format --check src/ tests/ evaluation/

      - name: Type check (mypy)
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true  # TODO: fix 106 type errors gradually

      - name: Security scan (bandit)
        run: bandit -r src/ -ll
        continue-on-error: true  # TODO: review security findings

      - name: Dependency audit (pip-audit)
        run: pip-audit --strict
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing --cov-fail-under=60

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage.xml

  docker:
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nvidia-lstm-forecast .

      - name: Build API Docker image
        run: docker build -f Dockerfile.api -t nvidia-lstm-forecast-api .

      - name: Test Docker Compose up
        run: |
          docker compose -f docker-compose.api.yml up -d --build
          sleep 10
          docker compose -f docker-compose.api.yml ps
          curl --fail http://localhost:8000/health || echo "⚠️ Health check failed"
          docker compose -f docker-compose.api.yml down
